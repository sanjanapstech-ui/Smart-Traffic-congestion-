<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart Traffic – Loading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body
    class="min-h-screen text-slate-900"
  >
    <div
      class="fixed inset-0 -z-10 bg-gradient-to-br from-fuchsia-200 via-sky-100 to-amber-100"
    ></div>
    <div class="fixed inset-0 -z-10 opacity-70 [mask-image:radial-gradient(white,transparent_70%)]">
      <div class="absolute -top-24 -left-24 h-96 w-96 rounded-full bg-fuchsia-400/40 blur-3xl"></div>
      <div class="absolute top-24 -right-24 h-[28rem] w-[28rem] rounded-full bg-sky-400/40 blur-3xl"></div>
      <div class="absolute -bottom-24 left-1/3 h-96 w-96 rounded-full bg-amber-300/40 blur-3xl"></div>
    </div>

    <canvas
      id="particles"
      class="pointer-events-none fixed inset-0 z-0 opacity-55"
      aria-hidden="true"
    ></canvas>

    <div
      class="relative z-10 min-h-screen flex items-center justify-center px-6"
      aria-label="Loading screen"
    >
      <div
        class="w-full max-w-md rounded-3xl border border-white/30 bg-white/55 p-8 text-center shadow-xl backdrop-blur"
      >
        <img
          id="logo"
          src="/static/logo.svg"
          alt="Smart Traffic"
          class="mx-auto h-24 w-24 drop-shadow-lg motion-safe:animate-[float_2.4s_ease-in-out_infinite]"
        />
        <h1 class="mt-4 text-2xl font-semibold tracking-tight">
          Smart Traffic
        </h1>
        <p class="mt-1 text-sm text-slate-700">Loading your dashboard…</p>

        <button
          id="skip"
          type="button"
          class="mt-6 inline-flex items-center justify-center rounded-xl bg-slate-900/90 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-slate-900"
        >
          Skip
        </button>
        <p class="mt-3 text-xs text-slate-600">Tip: click anywhere to continue</p>
        <noscript>
          <p class="mt-4 text-sm">
            JavaScript is required. Continue to the app:
            <a href="/app" class="text-indigo-600 underline">Open</a>
          </p>
        </noscript>
      </div>
    </div>

    <script>
      (function () {
        const go = () => {
          try {
            localStorage.setItem("splashSeen", "1");
          } catch {}
          window.location.replace("/app");
        };

        try {
          const force = new URLSearchParams(window.location.search).get("force");
          if (force !== "1" && localStorage.getItem("splashSeen") === "1") {
            go();
            return;
          }
        } catch {}

        const skip = document.getElementById("skip");

        if (skip) skip.addEventListener("click", go);
        document.addEventListener("click", go, { once: true });

        // Keep the logo screen visible for ~10 seconds,
        // then automatically continue to the main app.
        setTimeout(go, 10000);
      })();
    </script>

    <style>
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
    </style>

    <script src="/static/particles.js"></script>
    <script>
      window.startParticles?.(document.getElementById("particles"));
    </script>
  </body>
</html>
